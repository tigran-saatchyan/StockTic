{% extends 'layout/base.html' %}

{% block title %}
    Add Ticker to {{ watchlist.name }}
{% endblock %}

{% block content %}
    <h1>Add Ticker to {{ watchlist.name}}</h1>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.ticker.label_tag }}
            {{ form.ticker }}
        </div>
        <button type="submit" class="btn btn-primary">Add</button>
    </form>
{% endblock %}
